<div [class]="'form-field form-field--' + labelOrientation()">
  @if (controlSchema().label) {
    <span>{{ controlSchema().label }}</span>
  }

  <ng-container
    *ngComponentOutlet="
      componentType();
      inputs: {
        control: control(),
        controlSchema: controlSchema(),
      }
    " />

  <app-error-renderer [control]="control()" [controlSchema]="controlSchema()" />
</div>
