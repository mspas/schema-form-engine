<form
  [class]="'form form--' + schema().options?.orientation"
  [formGroup]="form()"
  (ngSubmit)="onSubmit()">
  @for (subjectSchema of schema().controls; track subjectSchema) {
    @if (subjectSchema.type === 'group') {
      <app-group-form-renderer [form]="form()" [schema]="subjectSchema" />
    } @else {
      <app-form-field
        [controlSchema]="subjectSchema"
        [control]="form().get(subjectSchema.controlName)!" />
    }
  }
  <button type="submit">Submit</button>
</form>
